global
    log /dev/log local0
    maxconn 4096
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    timeout connect 5s
    timeout client  30s
    timeout server  60s

frontend main
    bind *:8081

    acl is_api hdr(host) -i api.gerges.maurice-cloud.fr
    use_backend api_servers if is_api
    default_backend frontend_servers

backend frontend_servers
    balance roundrobin
    option httpchk GET /
    http-check expect status 200
    server vm1 192.168.9.101:8080 check inter 5s
    server vm2 192.168.9.102:8080 check inter 5s
    server vm3 192.168.9.103:8080 check inter 5s

backend api_servers
    balance roundrobin
    option httpchk GET /health
    http-check expect string ok
    server vm1 192.168.9.101:3001 check inter 5s
    server vm2 192.168.9.102:3001 check inter 5s
    server vm3 192.168.9.103:3001 check inter 5s

listen stats
    bind *:9000
    stats enable
    stats uri /stats
    stats refresh 5s
    stats auth admin:cloudvirt
