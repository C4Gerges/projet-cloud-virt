global_defs {
    router_id VM2
}

# Promote to MASTER if haproxy is healthy here and VM1 is down
vrrp_script check_haproxy {
    script "systemctl is-active --quiet haproxy"
    interval 2
    weight -30
}

vrrp_instance VI_1 {
    state BACKUP
    interface IFACE
    virtual_router_id 51
    priority 90
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass cloudvirt2026
    }

    virtual_ipaddress {
        192.168.9.110/24
    }

    track_script {
        check_haproxy
    }
}
